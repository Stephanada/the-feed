name = "the-feed-ingest"
main = "index.js"
compatibility_date = "2026-03-01"

kv_namespaces = [
  { binding = "SOURCE_TOKENS_KV", id = "c01bf86f689b42d79123ee945c70a710" }
]

[vars]
GITHUB_OWNER = "Stephanada"
GITHUB_REPO = "the-feed"
GITHUB_PRODUCTION_BRANCH = "main"
GITHUB_STAGING_BRANCH = "staging"
ALLOWED_ORIGINS = "https://thefeed.site,https://the-feed-ui.pages.dev,http://localhost:3000"

# Secrets (set via: wrangler secret put <NAME>)
# GITHUB_TOKEN
# DEFAULT_OPENAI_KEY   ← used when verified tokens submit without BYOK header

[env.production]
name = "the-feed-ingest-production"

[env.staging]
name = "the-feed-ingest-staging"
